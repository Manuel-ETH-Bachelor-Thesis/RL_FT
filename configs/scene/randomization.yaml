light:
  ceiling_light:
    diffuse:
      default: [0.8, 0.8, 0.8]
      clip: [0.0, 1.0]
      noise:
        type: "normal"
        kwargs:
          loc: [0.0, 0.0, 0.0]
          scale: [0.5, 0.5, 0.5]
  walimex_octabox_left:
    pos:
      default: [0.0, 0.0, 0.0]
      noise:
        type: "uniform"
        kwargs:
          low: [0.0, -0.5, -0.5]
          high: [0.0, 0.5, 0.5]
  walimex_octabox_right:
    pos:
      default: [0.0, 0.0, 0.0]
      noise:
        type: "uniform"
        kwargs:
          low: [0.0, -0.5, -0.5]
          high: [0.0, 0.5, 0.5]

geom:
