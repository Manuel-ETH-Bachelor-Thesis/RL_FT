    size:
      default: [0.4495, 0.4145, 0.01]
      noise:
        type: "uniform"
        kwargs:
          high: [0.05, 0.05, 0.01]
          low: [-0.05, -0.05, 0.01]
    friction:
      default: [0.4, 0.005, 0.0001]
      noise:
        type: "uniform"
        kwargs:
          low: [-0.15, -0.002, 0.0]
          high: [0.2, 0.005, 0.0]
